# GlazeWM config — Win (Super) as the mod key, to match a Linux tiling-WM setup.
#
# Modifier-namespace model (no cross-layer collisions by construction):
#   GlazeWM  -> Win/Super   (nothing in the terminal stack uses Win)
#   WezTerm  -> Ctrl+Shift   tmux -> Ctrl+Space prefix   nvim/TUIs -> Ctrl / Alt+letter / Space
#
# OS-reserved Win combos that GlazeWM CANNOT intercept — never bind these:
#   Win+L (lock), Win+Ctrl+arrows (virtual desktops), Win+Tab (Task View),
#   Win+Space (input language), Win+G (Game Bar).
# Hence focus uses Win+arrows (not hjkl — Win+L would lock the screen).

general:
  startup_commands: ['shell-exec zebar']                       # optional bar; remove if unused
  shutdown_commands: ['shell-exec taskkill /IM zebar.exe /F']
  config_reload_commands: []
  focus_follows_cursor: false
  toggle_workspace_on_refocus: false
  cursor_jump:
    enabled: true
    trigger: 'monitor_focus'

gaps:
  scale_with_dpi: true
  inner_gap: '8px'
  outer_gap: { top: '8px', right: '8px', bottom: '8px', left: '8px' }

# Focus border instead of animations — cheap to render, RDP-friendly.
window_effects:
  focused_window:
    border: { enabled: true, color: '#8aadf4' }
  other_windows:
    border: { enabled: false, color: '#6c7086' }

window_behavior:
  initial_state: 'tiling'
  state_defaults:
    floating:
      centered: true
      shown_on_top: true        # floating windows stay above tiled ones (the "pin" behaviour)
    fullscreen:
      maximized: false
      shown_on_top: true

workspaces:
  - { name: '1' }
  - { name: '2' }
  - { name: '3' }
  - { name: '4' }
  - { name: '5' }
  - { name: '6' }
  - { name: '7' }
  - { name: '8' }
  - { name: '9' }

window_rules:
  # Don't manage the bar.
  - commands: ['ignore']
    match:
      - window_process: { equals: 'zebar' }

  # Auto-float dialogs and utility windows (matchers are OR'd).
  - commands: ['set-floating']
    match:
      - window_class: { equals: '#32770' }            # generic Win32 dialog (catches most modals)
      - window_process: { equals: 'Taskmgr' }
      - window_process: { equals: 'SystemSettings' }  # Settings app
      - window_process: { equals: 'mmc' }             # management consoles
      - window_process: { equals: 'PickerHost' }      # file pickers
      - window_process: { equals: 'CalculatorApp' }
      # PiP / video example — float a Teams meeting window by title:
      # - window_process: { equals: 'ms-teams', window_title: { regex: 'Meeting' } }

keybindings:
  # Focus — arrows, like Hyprland's default movefocus.
  - { commands: ['focus --direction left'],  bindings: ['lwin+left'] }
  - { commands: ['focus --direction down'],  bindings: ['lwin+down'] }
  - { commands: ['focus --direction up'],    bindings: ['lwin+up'] }
  - { commands: ['focus --direction right'], bindings: ['lwin+right'] }

  # Move window.
  - { commands: ['move --direction left'],  bindings: ['lwin+shift+left'] }
  - { commands: ['move --direction down'],  bindings: ['lwin+shift+down'] }
  - { commands: ['move --direction up'],    bindings: ['lwin+shift+up'] }
  - { commands: ['move --direction right'], bindings: ['lwin+shift+right'] }

  # State (mnemonics match Hyprland: V=float, F=fullscreen).
  - { commands: ['toggle-floating --centered'], bindings: ['lwin+v'] }   # float = pin-on-top
  - { commands: ['toggle-fullscreen'],          bindings: ['lwin+f'] }
  - { commands: ['toggle-tiling-direction'],    bindings: ['lwin+t'] }
  - { commands: ['close'],                      bindings: ['lwin+shift+q'] }

  # Launch / WM control.
  - { commands: ['shell-exec wt'],     bindings: ['lwin+enter'] }   # Windows Terminal; swap for wezterm
  - { commands: ['wm-reload-config'],  bindings: ['lwin+shift+r'] }
  - { commands: ['wm-exit'],           bindings: ['lwin+shift+e'] }
  - { commands: ['wm-enable-binding-mode --name resize'], bindings: ['lwin+r'] }

  # Workspaces — Win+number is the most reliable combo GlazeWM intercepts.
  - { commands: ['focus --workspace 1'], bindings: ['lwin+1'] }
  - { commands: ['focus --workspace 2'], bindings: ['lwin+2'] }
  - { commands: ['focus --workspace 3'], bindings: ['lwin+3'] }
  - { commands: ['focus --workspace 4'], bindings: ['lwin+4'] }
  - { commands: ['focus --workspace 5'], bindings: ['lwin+5'] }
  - { commands: ['focus --workspace 6'], bindings: ['lwin+6'] }
  - { commands: ['focus --workspace 7'], bindings: ['lwin+7'] }
  - { commands: ['focus --workspace 8'], bindings: ['lwin+8'] }
  - { commands: ['focus --workspace 9'], bindings: ['lwin+9'] }
  - { commands: ['focus --recent-workspace'], bindings: ['lwin+grave'] }

  # Move focused window to workspace.
  - { commands: ['move --workspace 1'], bindings: ['lwin+shift+1'] }
  - { commands: ['move --workspace 2'], bindings: ['lwin+shift+2'] }
  - { commands: ['move --workspace 3'], bindings: ['lwin+shift+3'] }
  - { commands: ['move --workspace 4'], bindings: ['lwin+shift+4'] }
  - { commands: ['move --workspace 5'], bindings: ['lwin+shift+5'] }
  - { commands: ['move --workspace 6'], bindings: ['lwin+shift+6'] }
  - { commands: ['move --workspace 7'], bindings: ['lwin+shift+7'] }
  - { commands: ['move --workspace 8'], bindings: ['lwin+shift+8'] }
  - { commands: ['move --workspace 9'], bindings: ['lwin+shift+9'] }

binding_modes:
  - name: 'resize'
    keybindings:
      - { commands: ['resize --width -2%'],  bindings: ['h', 'left'] }
      - { commands: ['resize --width +2%'],  bindings: ['l', 'right'] }
      - { commands: ['resize --height +2%'], bindings: ['k', 'up'] }
      - { commands: ['resize --height -2%'], bindings: ['j', 'down'] }
      - { commands: ['wm-disable-binding-mode --name resize'], bindings: ['escape', 'enter'] }
