# mise global tool configuration
# These tools are installed via `mise install` and available globally on PATH
# See: https://mise.jdx.dev

[tools]
# Runtimes
dotnet = "latest"
node = "lts"

# CLI tools (aqua backend — pre-built binaries, no compilation)
bat = "latest"
eza = "latest"
yazi = "latest"
lazygit = "latest"
lazydocker = "latest"
delta = "latest"
"aqua:neovim/neovim" = "latest"
starship = "latest"
"aqua:junegunn/fzf" = "latest"
"aqua:ajeetdsouza/zoxide" = "latest"
"aqua:BurntSushi/ripgrep" = "latest"
"aqua:sharkdp/fd" = "latest"
"aqua:aristocratos/btop" = "latest"
"github:jorgerojas26/lazysql" = "latest"

